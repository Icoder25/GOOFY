name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit (Code Vulnerability Scanner)
        run: bandit -r app/

      - name: Run Safety (Dependency Vulnerability Scanner)
        run: safety check -r requirements.txt || true

  backend-lint-test:
    name: Backend - Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff linter
        run: ruff check app/

      - name: Run Black formatter check
        run: black --check app/

      - name: Run tests
        run: pytest tests/ -v

      - name: Type check with mypy
        run: |
          pip install mypy types-requests
          mypy app/ --ignore-missing-imports || true

  docs-check:
    name: Documentation Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check README exists
        run: test -f README.md

      - name: Validate intent schema JSON
        run: |
          python -c "import json; json.load(open('docs/intent-schema-v0.json'))"

      - name: Check documentation completeness
        run: |
          test -f docs/roadmap.md
          test -f docs/architecture.md
          test -f docs/backlog.md
